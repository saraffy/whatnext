<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Your Pathway</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Choose Your Pathway</h1>
    <p class="subtitle" id="goalDisplay"></p>

    <div id="pathwaysContainer" class="pathways-grid"></div>
    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged } from './firebase-config.js';

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    const pathwaysContainer = document.getElementById('pathwaysContainer');
    const goalDisplay = document.getElementById('goalDisplay');
    const errorDiv = document.getElementById('error');

    function loadPathways() {
      const goal = storage.getGoal();
      const pathways = storage.getPathways();

      if (!goal || !pathways) {
        window.location.href = 'index.html';
        return;
      }

      goalDisplay.textContent = `Goal: ${goal}`;
      renderPathways(pathways);
    }

    function renderPathways(pathways) {
      pathwaysContainer.innerHTML = pathways.map((p, i) => `
        <div class="pathway-card" onclick="selectPathway(${i})">
          <span class="pathway-emoji">${p.emoji}</span>
          <div class="pathway-title">${p.title}</div>
          <div class="pathway-description">${p.description}</div>
        </div>
      `).join('');
    }

    window.selectPathway = (index) => {
      const pathways = storage.getPathways();
      const pathway = pathways[index];
      storage.setPathway(pathway.title);
      window.location.href = 'duration.html';
    };

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    loadPathways();
  </script>
</body>
</html>
