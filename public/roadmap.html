<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your 7-Day Roadmap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Your 7-Day Roadmap</h1>
    <p class="subtitle" id="pathwayDisplay"></p>

    <div class="roadmap-container">
      <div class="days-sidebar" id="daysBtns"></div>
      <div class="roadmap-content">
        <div class="day-theme" id="dayTheme"></div>
        <div class="task-list" id="taskList"></div>
        <button class="stuck-button" onclick="showStuckMessage()">I'm Stuck</button>
      </div>
    </div>

    <div id="error" class="error" style="display: none;"></div>
    <div id="confetti"></div>
  </div>

  <!-- Stuck Modal -->
  <div id="stuckModal" class="modal" style="display: none;">
    <div class="modal-content">
      <button class="modal-close" onclick="closeStuckModal()">&times;</button>
      <h2>You've Got This! 💪</h2>
      <p>Every expert was once a beginner. Break the task into smaller steps, ask for help, or come back to it later. Progress over perfection.</p>
      <div style="margin-top: 2rem; text-align: center;">
        <p style="color: #999; font-size: 0.9rem; margin-bottom: 1rem;">Here's a song to lift your spirits:</p>
        <iframe width="100%" height="315" src="https://www.youtube.com/embed/xcn_kEJIEkk?controls=1&modestbranding=1" title="The Climb - Miley Cyrus" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius: 8px;"></iframe>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    let currentDay = 1;
    let roadmap = [];

    function loadRoadmap() {
      const goal = storage.getGoal();
      const pathway = storage.getPathway();
      const savedRoadmap = storage.getRoadmap();

      if (!goal || !pathway || !savedRoadmap) {
        window.location.href = 'index.html';
        return;
      }

      roadmap = savedRoadmap;
      document.getElementById('pathwayDisplay').textContent = `Pathway: ${pathway}`;

      renderDayButtons();
      renderDay(currentDay);
    }

    function renderDayButtons() {
      const daysBtns = document.getElementById('daysBtns');
      daysBtns.innerHTML = roadmap.map((day) => `
        <button class="day-btn ${day.day === currentDay ? 'active' : ''}" onclick="switchDay(${day.day})">
          Day ${day.day}
        </button>
      `).join('');
    }

    window.switchDay = (day) => {
      currentDay = day;
      renderDayButtons();
      renderDay(day);
    };

    function allTasksCompleted(dayNum) {
      const day = roadmap.find((d) => d.day === dayNum);
      if (!day) return false;
      return day.tasks.every((_, i) => storage.isTaskCompleted(dayNum, i));
    }

    function renderDay(dayNum) {
      const day = roadmap.find((d) => d.day === dayNum);
      if (!day) return;

      document.getElementById('dayTheme').textContent = day.theme;

      const taskList = document.getElementById('taskList');
      taskList.innerHTML = day.tasks.map((task, i) => `
        <div class="task-item">
          <input
            type="checkbox"
            id="task-${dayNum}-${i}"
            ${storage.isTaskCompleted(dayNum, i) ? 'checked' : ''}
            onchange="toggleTask(${dayNum}, ${i})"
          >
          <div class="task-text">
            ${task.task}
            <div class="task-meta">
              <span class="task-duration">${task.duration}</span>
              <span class="task-type">${task.type}</span>
            </div>
          </div>
        </div>
      `).join('');

      // Check if all tasks completed
      if (allTasksCompleted(dayNum)) {
        triggerCelebration(dayNum);
      }
    }

    function triggerCelebration(dayNum) {
      const confettiKey = `wdid_celebrated_day_${dayNum}`;
      if (localStorage.getItem(confettiKey)) return; // Only celebrate once per day

      localStorage.setItem(confettiKey, 'true');
      createConfetti();
      showCelebrationMessage(dayNum);
    }

    function createConfetti() {
      const confettiContainer = document.getElementById('confetti');
      confettiContainer.innerHTML = '';

      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti-piece';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.delay = Math.random() * 0.5 + 's';
        confettiContainer.appendChild(confetti);
      }

      setTimeout(() => {
        confettiContainer.innerHTML = '';
      }, 3000);
    }

    function showCelebrationMessage(dayNum) {
      const messages = [
        '🎉 Day completed! You\'re crushing it!',
        '⭐ Amazing work! You\'re building momentum!',
        '🚀 Unstoppable! Keep this energy going!',
        '💯 Perfect day! You\'re a machine!',
        '✨ You\'re on fire! Keep going!'
      ];
      const msg = messages[Math.floor(Math.random() * messages.length)];

      const celebration = document.createElement('div');
      celebration.className = 'celebration-message';
      celebration.textContent = msg;
      document.querySelector('.container').appendChild(celebration);

      setTimeout(() => celebration.remove(), 3000);
    }

    window.toggleTask = (day, index) => {
      storage.toggleTask(day, index);
      renderDay(currentDay);
    };

    window.showStuckMessage = () => {
      document.getElementById('stuckModal').style.display = 'flex';
    };

    window.closeStuckModal = () => {
      document.getElementById('stuckModal').style.display = 'none';
    };

    // Close modal on outside click
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('stuckModal');
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });

    loadRoadmap();
  </script>
</body>
</html>
