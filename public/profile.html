<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatNext</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-container {
      max-width: 500px;
      margin: 2rem auto;
    }

    .profile-card {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 2rem;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1.5rem;
      border: 2px solid #444;
    }

    .profile-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      color: #e8e8e8;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
      padding: 0.75rem;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4f8ef7;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .save-btn {
      flex: 1;
      background: #4f8ef7;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover {
      background: #3d7dd4;
    }

    .save-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .success-msg {
      color: #6bcf7f;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 1rem;
    }

    .info-text {
      color: #666;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-container">
      <h1>Your Profile</h1>

      <div class="profile-card">
        <div class="profile-avatar" id="avatar">👤</div>

        <form class="profile-form" onsubmit="saveProfile(event)">
          <div class="form-group">
            <label for="displayName">Display Name</label>
            <input type="text" id="displayName" placeholder="Your name" />
            <div class="info-text">Shown on goal cards and in the app</div>
          </div>

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="@username" />
            <div class="info-text">Your unique handle (optional)</div>
          </div>

          <div class="form-group">
            <label for="status">Status / Bio</label>
            <textarea id="status" placeholder="What are you working on? (optional)"></textarea>
            <div class="info-text">A short status or bio (max 100 chars)</div>
          </div>

          <div class="button-group">
            <button type="submit" class="save-btn" id="saveBtn">Save Changes</button>
          </div>

          <div id="successMsg" class="success-msg" style="display: none;">✓ Profile updated!</div>
        </form>
      </div>

      <div id="error" class="error" style="display: none; margin-top: 1.5rem;"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="nav.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged, updateProfile, db, getDoc, doc, setDoc } from './firebase-config.js';

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      currentUser = user;
      loadProfile(user);
    });

    async function loadProfile(user) {
      const displayNameInput = document.getElementById('displayName');
      const usernameInput = document.getElementById('username');
      const statusInput = document.getElementById('status');
      const avatar = document.getElementById('avatar');

      // Load from Firebase Auth
      if (user.displayName) {
        displayNameInput.value = user.displayName;
        avatar.textContent = user.displayName.charAt(0).toUpperCase();
      }

      // Load custom fields from Firestore
      try {
        const userDocRef = doc(db, 'users', user.uid);
        const docSnap = await getDoc(userDocRef);
        if (docSnap.exists()) {
          const data = docSnap.data();
          if (data.username) usernameInput.value = data.username;
          if (data.status) statusInput.value = data.status;
        }
      } catch (err) {
        console.log('Error loading profile:', err);
      }
    }

    window.saveProfile = async (e) => {
      e.preventDefault();

      const displayName = document.getElementById('displayName').value.trim();
      const username = document.getElementById('username').value.trim();
      const status = document.getElementById('status').value.trim();
      const saveBtn = document.getElementById('saveBtn');
      const successMsg = document.getElementById('successMsg');
      const errorDiv = document.getElementById('error');

      if (!displayName) {
        errorDiv.textContent = 'Display name is required';
        errorDiv.style.display = 'block';
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      errorDiv.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        // Update Firebase Auth profile
        await updateProfile(currentUser, { displayName });

        // Update Firestore custom fields
        await setDoc(doc(db, 'users', currentUser.uid), {
          username,
          status,
          updatedAt: new Date(),
        }, { merge: true });

        successMsg.style.display = 'block';
        saveBtn.textContent = 'Save Changes';
        setTimeout(() => {
          successMsg.style.display = 'none';
        }, 3000);
      } catch (err) {
        errorDiv.textContent = 'Error saving profile: ' + err.message;
        errorDiv.style.display = 'block';
        console.error(err);
      } finally {
        saveBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
