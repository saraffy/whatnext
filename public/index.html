<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Do I Do Next?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="position: absolute; top: 1rem; right: 1rem;">
      <button id="logoutBtn" onclick="logout()" style="background: #666; padding: 0.5rem 1rem; border: none; border-radius: 6px; color: white; cursor: pointer; font-size: 0.9rem;">Logout</button>
    </div>
    <h1>What do you want to do or become?</h1>
    <p class="subtitle">Turn your ambition into a structured 7-day action plan.</p>

    <div class="examples">
      <span>Examples:</span>
      <span style="color: #4f8ef7;">Start a music career</span> •
      <span style="color: #4f8ef7;">Get into AI</span> •
      <span style="color: #4f8ef7;">Build a startup</span>
    </div>

    <input type="text" id="goalInput" placeholder="Your goal or ambition...">

    <div class="quick-goals">
      <span>Quick start:</span>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Reduce my screentime')">📵 Reduce screentime</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Learn how to use AI')">🤖 Learn AI</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Start running regularly')">🏃 Start running</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Build a startup')">🚀 Build a startup</button>
    </div>

    <button id="submitBtn">Generate Pathways</button>

    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged, signOut } from './firebase-config.js';

    // Check if user is logged in
    let userLoggedIn = false;
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        userLoggedIn = true;
      }
    });

    // Logout function
    window.logout = async function() {
      try {
        await signOut(auth);
        localStorage.clear();
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Logout error:', error);
        alert('Error logging out: ' + error.message);
      }
    };

    const goalInput = document.getElementById('goalInput');
    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('error');

    submitBtn.addEventListener('click', async () => {
      const goal = goalInput.value.trim();
      if (!goal) {
        showError('Please enter a goal or ambition.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Analyzing your goal...';
      errorDiv.style.display = 'none';

      try {
        storage.setGoal(goal);
        const data = await api.analyzeGoal(goal);
        storage.setSummaryData(data.summary, data.encouragement, data.pathways);
        window.location.href = 'braindump.html';
      } catch (err) {
        showError('Failed to analyze goal. Please try again.');
        console.error(err);
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Generate Pathways';
      }
    });

    goalInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        submitBtn.click();
      }
    });

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    window.quickStart = (text) => {
      goalInput.value = text;
      submitBtn.click();
    };
  </script>
</body>
</html>
