<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatNext</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <img src="logo.svg" alt="WhatNext" style="height:90px;width:auto;">
    </div>
    <h1 id="tagline"></h1>
    <p class="subtitle">Turn your ambition into a structured action plan.</p>

    <input type="text" id="goalInput" placeholder="Your goal or ambition...">

    <div class="quick-goals">
      <span>Quick start:</span>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Reduce my screentime')">📵 Reduce screentime</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Learn how to use AI')">🤖 Learn AI</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Start running regularly')">🏃 Start running</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Build a startup')">🚀 Build a startup</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Start a music career')">🎵 Start a music career</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Get fit')">💪 Get fit</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Write a book')">✍️ Write a book</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Learn investing')">💰 Learn investing</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Build a website')">🌐 Build a website</button>
      <button type="button" class="quick-goal-chip" onclick="quickStart('Build a daily habit')">🧘 Build a daily habit</button>
    </div>

    <button id="submitBtn">Generate Pathways</button>

    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
  <script src="nav.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged, signOut } from './firebase-config.js';

    // Check if user is logged in
    let userLoggedIn = false;
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        userLoggedIn = true;
      }
    });

    // Rotating taglines
    const taglines = [
      "What's the one thing you've been putting off?",
      "If you could become anything, what would it be?",
      "What would you do if you knew you couldn't fail?",
      "What does the best version of you look like?",
      "What's the dream you haven't acted on yet?"
    ];
    document.getElementById('tagline').textContent = taglines[Math.floor(Math.random() * taglines.length)];

    // Logout function
    window.logout = async function() {
      try {
        await signOut(auth);
        localStorage.clear();
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Logout error:', error);
        alert('Error logging out: ' + error.message);
      }
    };

    const goalInput = document.getElementById('goalInput');
    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('error');

    submitBtn.addEventListener('click', async () => {
      const goal = goalInput.value.trim();
      if (!goal) {
        showError('Please enter a goal or ambition.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Analyzing your goal...';
      errorDiv.style.display = 'none';

      try {
        const data = await api.analyzeGoal(goal);
        storage.createGoal(goal, data.summary);
        storage.setSummaryData(data.summary, data.encouragement, data.pathways);
        window.location.href = 'braindump.html';
      } catch (err) {
        showError('Failed to analyze goal. Please try again.');
        console.error(err);
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Generate Pathways';
      }
    });

    goalInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        submitBtn.click();
      }
    });

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    window.quickStart = (text) => {
      goalInput.value = text;
      submitBtn.click();
    };
  </script>
</body>
</html>
