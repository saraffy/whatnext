<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatNext</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .duration-presets {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .duration-preset {
      padding: 0.75rem 1.5rem;
      background: #1a1a1a;
      border: 2px solid #333;
      color: #aaa;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .duration-preset:hover {
      border-color: #4f8ef7;
      color: #4f8ef7;
    }

    .duration-preset.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
    }

    .duration-label {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Choose Your Roadmap Duration</h1>
    <p class="subtitle">How long do you want to dedicate to this goal?</p>

    <label class="duration-label">Quick presets:</label>
    <div class="duration-presets" id="durationPresets"></div>

    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
  <script src="nav.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged } from './firebase-config.js';

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    const presets = [
      { id: '1d', label: '1 Day' },
      { id: '3d', label: '3 Days' },
      { id: '1w', label: '1 Week' },
      { id: '2w', label: '2 Weeks' },
      { id: '1m', label: '1 Month' },
      { id: '3m', label: '3 Months' },
      { id: '6m', label: '6 Months' },
      { id: '1y', label: '1 Year' },
      { id: '2y', label: '2 Years' },
      { id: '5y', label: '5 Years' },
    ];

    let selectedDuration = '1w';

    function loadDuration() {
      const goals = storage.getGoalsList();
      const activeId = storage.getActiveGoalId();
      const activeGoal = goals.find(g => g.id === activeId);

      if (!activeGoal) {
        window.location.href = 'index.html';
        return;
      }

      renderPresets();
    }

    function renderPresets() {
      const presetsDiv = document.getElementById('durationPresets');
      presetsDiv.innerHTML = presets.map((p) => `
        <button type="button" class="duration-preset ${p.id === selectedDuration ? 'active' : ''}" onclick="selectDuration('${p.id}')">
          ${p.label}
        </button>
      `).join('');
    }

    window.selectDuration = async (duration) => {
      const goals = storage.getGoalsList();
      const activeId = storage.getActiveGoalId();
      const activeGoal = goals.find(g => g.id === activeId);
      const braindump = activeId ? (localStorage.getItem(`wdid_${activeId}_braindump`) || '') : '';
      const errorDiv = document.getElementById('error');
      const presetsDiv = document.getElementById('durationPresets');

      selectedDuration = duration;
      renderPresets();

      // Show loading state
      presetsDiv.style.opacity = '0.5';
      presetsDiv.style.pointerEvents = 'none';
      errorDiv.style.display = 'none';

      try {
        storage.setCurrentDuration(duration);

        // Generate roadmap for selected duration
        const roadmap = await api.generateRoadmap(activeGoal.goal, braindump, duration);
        storage.setRoadmapForDuration(duration, roadmap.roadmap);

        window.location.href = 'roadmap.html';
      } catch (err) {
        errorDiv.textContent = 'Failed to generate roadmap. Please try again.';
        errorDiv.style.display = 'block';
        console.error(err);
        // Restore presets on error
        presetsDiv.style.opacity = '1';
        presetsDiv.style.pointerEvents = 'auto';
      }
    };

    loadDuration();
  </script>
</body>
</html>
