<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Dump - What Do I Do Next?</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .braindump-container {
      max-width: 600px;
      margin: 0 auto;
    }

    .goal-header {
      font-size: 1.1rem;
      color: #999;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .goal-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: #4f8ef7;
      margin-bottom: 2rem;
      text-align: center;
    }

    .braindump-prompt {
      color: #ccc;
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 250px;
      padding: 1rem;
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
      margin-bottom: 1.5rem;
      box-sizing: border-box;
    }

    textarea:focus {
      outline: none;
      border-color: #4f8ef7;
    }

    .examples-text {
      color: #666;
      font-size: 0.85rem;
      font-style: italic;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .skip-link {
      color: #4f8ef7;
      cursor: pointer;
      text-decoration: underline;
      font-size: 0.95rem;
      padding: 0.75rem 1.5rem;
    }

    .skip-link:hover {
      color: #3d7dd4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="braindump-container">
      <div class="goal-header">Your goal</div>
      <div class="goal-text" id="goalDisplay"></div>

      <div class="braindump-prompt">
        Tell us anything that might help us build your roadmap
      </div>

      <div class="examples-text">
        💡 Examples: how much time I have daily, what I've tried before, my biggest constraint, relevant skills I have...
      </div>

      <textarea id="braindumpText" placeholder="Optional: Share any context that will help personalize your roadmap..."></textarea>

      <div class="button-group">
        <button class="next-day-button" id="continueBtn">Continue →</button>
        <button type="button" class="skip-link" onclick="skipBraindump()">Skip</button>
      </div>

      <div id="error" class="error" style="display: none;"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged } from './firebase-config.js';

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    const goalDisplay = document.getElementById('goalDisplay');
    const braindumpText = document.getElementById('braindumpText');
    const continueBtn = document.getElementById('continueBtn');
    const errorDiv = document.getElementById('error');

    function loadBraindump() {
      const goals = storage.getGoalsList();
      const activeId = storage.getActiveGoalId();
      const activeGoal = goals.find(g => g.id === activeId);

      if (!activeGoal) {
        window.location.href = 'index.html';
        return;
      }
      goalDisplay.textContent = activeGoal.goal;
    }

    continueBtn.addEventListener('click', () => {
      const braindump = braindumpText.value.trim();
      const activeId = storage.getActiveGoalId();
      if (braindump && activeId) {
        localStorage.setItem(`wdid_${activeId}_braindump`, braindump);
      }
      window.location.href = 'duration.html';
    });

    window.skipBraindump = () => {
      const activeId = storage.getActiveGoalId();
      if (activeId) {
        localStorage.removeItem(`wdid_${activeId}_braindump`);
      }
      window.location.href = 'duration.html';
    };

    loadBraindump();
  </script>
</body>
</html>
